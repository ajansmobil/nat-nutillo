<script>
  
  setTimeout(function () {
    var moduleRoots = document.querySelectorAll(".xsvupcat3");

    for (var r = 0; r < moduleRoots.length; r++) {
      (function (root) {
        var cards = root.querySelectorAll(".xsvupbodycardlink");

        if (!cards.length) {
          return;
        }

        
        if (
          window.matchMedia &&
          window.matchMedia("(prefers-reduced-motion: reduce)").matches
        ) {
          for (var i = 0; i < cards.length; i++) {
            cards[i].classList.add("xsvupcardvisible");
          }
          return;
        }

        if (typeof IntersectionObserver === "undefined") {
          for (var j = 0; j < cards.length; j++) {
            cards[j].classList.add("xsvupcardvisible");
          }
          return;
        }

        var observer = new IntersectionObserver(
          function (entries) {
            for (var k = 0; k < entries.length; k++) {
              var entry = entries[k];
              if (entry.isIntersecting) {
                entry.target.classList.add("xsvupcardvisible");
                observer.unobserve(entry.target);
              }
            }
          },
          {
            threshold: 0.12,
            rootMargin: "0px 0px -40px 0px",
          }
        );

        for (var m = 0; m < cards.length; m++) {
          observer.observe(cards[m]);
        }
      })(moduleRoots[r]);
    }
  }, 80);
</script>

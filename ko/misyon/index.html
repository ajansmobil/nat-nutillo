<script>
  setTimeout(function() {
    var menuToggleBtn = document.querySelector(".pu5f9-menu-btn");
    var menu = document.querySelector(".pu5f9-menu");
    var overlay = document.querySelector(".pu5f9-menu-overlay");
    var closeButton = document.querySelector(".pu5f9-menu-close");

    if (!menuToggleBtn || !menu) {
      return;
    }

    var mql = window.matchMedia("(max-width: 1024px)");

    function openMenu() {
      menu.classList.add("active");
      if (overlay) {
        overlay.classList.add("active");
        overlay.setAttribute("aria-hidden", "false");
      }
      document.body.style.overflow = "hidden";
    }

    function closeMenu() {
      menu.classList.remove("active");
      if (overlay) {
        overlay.classList.remove("active");
        overlay.setAttribute("aria-hidden", "true");
      }
      document.body.style.overflow = "";
      if (menuToggleBtn) {
        menuToggleBtn.focus();
      }
    }

    menuToggleBtn.addEventListener("click", function(e) {
      e.preventDefault();
      e.stopPropagation();
      if (menu.classList.contains("active")) {
        closeMenu();
      } else {
        openMenu();
      }
    });

    if (closeButton) {
      closeButton.addEventListener("click", function(e) {
        e.preventDefault();
        e.stopPropagation();
        closeMenu();
      });
    }

    if (overlay) {
      overlay.addEventListener("click", function(e) {
        e.preventDefault();
        e.stopPropagation();
        closeMenu();
      });
    }

    menu.addEventListener("click", function(event) {
      var link = event.target.closest("a");
      var closeBtn = event.target.closest(".pu5f9-menu-close");
      if (link && !closeBtn) {
        closeMenu();
      }
    });

    document.addEventListener("keydown", function(e) {
      if (e.key === "Escape" && menu.classList.contains("active")) {
        closeMenu();
      }
    });

    menuToggleBtn.addEventListener("keydown", function(e) {
      if (e.key === "Enter" || e.key === " ") {
        e.preventDefault();
        if (menu.classList.contains("active")) {
          closeMenu();
        } else {
          openMenu();
        }
      }
    });

    function handleBreakpoint() {
      if (!mql.matches) {
        menu.classList.remove("active");
        if (overlay) {
          overlay.classList.remove("active");
          overlay.setAttribute("aria-hidden", "true");
        }
        document.body.style.overflow = "";
      }
    }

    if (typeof mql.addEventListener === "function") {
      mql.addEventListener("change", handleBreakpoint);
    } else if (typeof mql.addListener === "function") {
      mql.addListener(handleBreakpoint);
    }
    handleBreakpoint();

    var topButtons = document.querySelectorAll(".pu5f9-top");
    var bi;
    for (bi = 0; bi < topButtons.length; bi++) {
      topButtons[bi].addEventListener("click", function(e) {
        e.stopPropagation();
        var group = this.closest(".pu5f9-menu-group");
        if (!group) {
          return;
        }
        var sub = group.querySelector(".pu5f9-sub");
        var isOpen = group.classList.toggle("open");
        this.classList.toggle("active", isOpen);
        var icon = this.querySelector(".pu5f9-icon");
        if (icon) {
          icon.textContent = isOpen ? "expand_less" : "expand_more";
        }
        if (sub) {
          sub.classList.toggle("show", isOpen);
        }
      });
    }
  }, 100);
</script>

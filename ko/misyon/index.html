<script>
  
  if (typeof menu2_toggle === "undefined") {
    function menu2_toggle() {
      var root = document.getElementById("menu-2-root");
      if (!root) {
        return;
      }
      var wrapper = root.closest ? root.closest(".ua3cc") : null;
      var target = wrapper || root;
      if (target.classList.contains("ua3ccmenu-open")) {
        target.classList.remove("ua3ccmenu-open");
      } else {
        target.classList.add("ua3ccmenu-open");
      }
    }
  }
</script>

    </button>
    <a class="j6fpm-menu-link" href="/ko/hakkimizda/">Hakkımızda</a><a class="j6fpm-menu-link active" href="/ko/misyon/">Misyon</a><a class="j6fpm-menu-link" href="/ko/vizyon/">Vizyon</a><a class="j6fpm-menu-link" href="/ko/kalite-politikamiz/">Kalite Politikamız</a><a class="j6fpm-menu-link" href="/ko/gizlilik-politikasi/">Gizlilik Politikası</a><a class="j6fpm-menu-link" href="/ko/kisisel-veriler/">Kişisel Veriler</a><a class="j6fpm-menu-link" href="/ko/kullanici-haklari/">Kullanıcı Hakları</a><a class="j6fpm-menu-link" href="/ko/yasal-uyari/">Yasal Uyarı</a>

<script>
  setTimeout(function() {
    var menuToggleBtn = document.querySelector(".j6fpm-menu-btn");
    var menu = document.querySelector(".j6fpm-menu");
    var overlay = document.querySelector(".j6fpm-menu-overlay");
    var closeButton = document.querySelector(".j6fpm-menu-close");
    
    if (!menuToggleBtn || !menu) {
      return;
    }
    
    var mql = window.matchMedia("(max-width: 1024px)");

    function openMenu() {
      if (menu) {
        menu.classList.add("active");
      }
      if (overlay) {
        overlay.classList.add("active");
        overlay.setAttribute("aria-hidden", "false");
      }

      document.body.style.overflow = "hidden";
    }

    function closeMenu() {
      if (menu) {
        menu.classList.remove("active");
      }
      if (overlay) {
        overlay.classList.remove("active");
        overlay.setAttribute("aria-hidden", "true");
      }

      document.body.style.overflow = "";

      if (menuToggleBtn) {
        menuToggleBtn.focus();
      }
    }

    menuToggleBtn.addEventListener("click", function (e) {
      e.preventDefault();
      e.stopPropagation();
      if (menu.classList.contains("active")) {
        closeMenu();
      } else {
        openMenu();
      }
    });

    if (closeButton) {
      closeButton.addEventListener("click", function (e) {
        e.preventDefault();
        e.stopPropagation();
        closeMenu();
      });
    }

    if (overlay) {
      overlay.addEventListener("click", function (e) {
        e.preventDefault();
        e.stopPropagation();
        closeMenu();
      });
    }

    menu.addEventListener("click", function (event) {
      var link = event.target.closest("a");
      var closeBtn = event.target.closest(".j6fpm-menu-close");
      if (link && !closeBtn) {
        closeMenu();
      }
    });

    document.addEventListener("keydown", function (e) {
      if (e.key === "Escape" && menu && menu.classList.contains("active")) {
        closeMenu();
      }
    });

    menuToggleBtn.addEventListener("keydown", function (e) {
      if (e.key === "Enter" || e.key === " ") {
        e.preventDefault();
        if (menu.classList.contains("active")) {
          closeMenu();
        } else {
          openMenu();
        }
      }
    });

    function handleBreakpoint() {
      if (!mql.matches) {

        if (menu) {
          menu.classList.remove("active");
        }
        if (overlay) {
          overlay.classList.remove("active");
          overlay.setAttribute("aria-hidden", "true");
        }
        document.body.style.overflow = "";
      }
    }
    
    if (typeof mql.addEventListener === "function") {
      mql.addEventListener("change", handleBreakpoint);
    } else if (typeof mql.addListener === "function") {
      mql.addListener(handleBreakpoint);
    }
    handleBreakpoint();

    document.querySelectorAll(".j6fpm-top").forEach(function (button) {
      button.addEventListener("click", function (e) {
        e.stopPropagation();
        var group = this.closest(".j6fpm-menu-group");
        if (!group) return;
        var sub = group.querySelector(".j6fpm-sub");
        var isOpen = group.classList.toggle("open");
        this.classList.toggle("active", isOpen);
        var icon = this.querySelector(".j6fpm-icon");
        if (icon) {
          icon.textContent = isOpen ? "expand_less" : "expand_more";
        }
        if (sub) {
          sub.classList.toggle("show", isOpen);
        }
      });
    });
  }, 100);
</script>

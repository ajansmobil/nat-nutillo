    for (var r = 0; r < moduleRoots.length; r++) {
      (function (root) {
        var cards = root.querySelectorAll(".jovcubodycardlink");

        if (!cards.length) {
          return;

        if (
          window.matchMedia &&

        ) {
          for (var i = 0; i < cards.length; i++) {

        if (typeof IntersectionObserver === "undefined") {
          for (var j = 0; j < cards.length; j++) {
            cards[j].classList.add("jovcucardvisible");

          return;

        var observer = new IntersectionObserver(
          function (entries) {
            for (var k = 0; k < entries.length; k++) {
              var entry = entries[k];
              if (entry.isIntersecting) {
                entry.target.classList.add("jovcucardvisible");

              }

          },
          {
            threshold: 0.12,
            rootMargin: "0px 0px -40px 0px",
          }
        );

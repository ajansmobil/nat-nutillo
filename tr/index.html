<script>
  
  if (typeof menu2_toggle === "undefined") {
    function menu2_toggle() {
      var root = document.getElementById("menu-2-root");
      if (!root) {
        return;
      }
      var wrapper = root.closest ? root.closest(".tljm0") : null;
      var target = wrapper || root;
      if (target.classList.contains("tljm0menu-open")) {
        target.classList.remove("tljm0menu-open");
      } else {
        target.classList.add("tljm0menu-open");
      }
    }
  }
</script>

<script>

(function headerSliderInit() {
  var attempts = 0;
  var maxAttempts = 20;
  var timer = setInterval(function () {
    attempts++;
    if (typeof Swiper === "function") {
      clearInterval(timer);
      new Swiper(".c52ji", {
        slidesPerView: 1,
        spaceBetween: 30,
        loop: true,
        autoplay: {
          delay: "3000",
          disableOnInteraction: false,
        },
        pagination: {
          el: ".swiper-pagination",
          clickable: true,
        },
        navigation: {
          nextEl: ".swiper-button-next",
          prevEl: ".swiper-button-prev",
        },
      });
    } else if (attempts >= maxAttempts) {
      clearInterval(timer);
      console.warn("header/slider: Swiper bulunamadı, slider başlatılamadı.");
    }
  }, 250);
})();
</script>

  <script>
    setTimeout(function() {
      var currentPath = window.location.pathname;
      var rtlLanguages = ['ar', 'he', 'fa'];
      var langMatch = currentPath.match(/^\/([a-z]{2})\//);
      var currentLang = langMatch ? langMatch[1] : '';
      if (rtlLanguages.indexOf(currentLang) !== -1) {
        document.documentElement.setAttribute('dir', 'rtl');
      } else {
        document.documentElement.setAttribute('dir', 'ltr');
      }
    }, 100);
  </script>
